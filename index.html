<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cool Hero</title>
    <style>
      :root{
        --bg0:#070A12;
        --bg1:#0B1224;
        --card: rgba(255,255,255,.06);
        --stroke: rgba(255,255,255,.14);
        --text:#EAF0FF;
        --muted: rgba(234,240,255,.72);
        --a:#7C5CFF;
        --b:#33D6FF;
        --c:#30FFB2;
        --shadow: 0 30px 80px rgba(0,0,0,.55);
        --radius: 22px;
      }
      *{box-sizing:border-box}
      body{
        margin:0;
        min-height:100svh;
        display:grid;
        place-items:center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
        color:var(--text);
        background:
          radial-gradient(1200px 700px at 15% 20%, rgba(124,92,255,.22), transparent 55%),
          radial-gradient(1000px 600px at 85% 30%, rgba(51,214,255,.20), transparent 55%),
          radial-gradient(900px 700px at 55% 90%, rgba(48,255,178,.14), transparent 55%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
        overflow-x:hidden;
      }
      .wrap{width:min(980px, 92vw); padding:56px 0}
      .hero{
        position:relative;
        border-radius:var(--radius);
        background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
        border:1px solid var(--stroke);
        box-shadow: var(--shadow);
        padding: clamp(26px, 4vw, 44px);
        overflow:hidden;
        isolation:isolate;
      }
      .hero::before{
        content:"";
        position:absolute; inset:-2px;
        background: conic-gradient(from 200deg, rgba(124,92,255,.35), rgba(51,214,255,.30), rgba(48,255,178,.25), rgba(124,92,255,.35));
        filter: blur(30px);
        opacity:.55;
        z-index:-2;
      }
      .hero::after{
        content:"";
        position:absolute; inset:0;
        background:
          radial-gradient(800px 260px at 35% 10%, rgba(255,255,255,.10), transparent 60%),
          radial-gradient(700px 240px at 75% 65%, rgba(255,255,255,.07), transparent 60%);
        z-index:-1;
      }
      .badge{
        display:inline-flex;
        gap:10px;
        align-items:center;
        padding:8px 12px;
        border-radius:999px;
        background: rgba(0,0,0,.22);
        border: 1px solid rgba(255,255,255,.14);
        backdrop-filter: blur(10px);
        color: var(--muted);
        font-size: 13px;
        letter-spacing:.2px;
      }
      .dot{
        width:10px; height:10px; border-radius:50%;
        background: linear-gradient(180deg, var(--b), var(--c));
        box-shadow: 0 0 0 4px rgba(51,214,255,.12);
      }
      h1{
        margin: 16px 0 10px;
        font-size: clamp(32px, 4.2vw, 54px);
        line-height: 1.05;
        letter-spacing: -0.02em;
      }
      .sub{
        margin: 0 0 22px;
        color: var(--muted);
        font-size: clamp(15px, 1.5vw, 18px);
        max-width: 60ch;
      }
      .card{
        margin-top: 18px;
        padding: 18px 18px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,.16);
        background: rgba(255,255,255,.06);
        display:flex;
        gap:14px;
        align-items:flex-start;
      }
      .emoji{
        width: 42px; height: 42px;
        border-radius: 14px;
        display:grid; place-items:center;
        background: rgba(0,0,0,.18);
        border: 1px solid rgba(255,255,255,.14);
        font-size: 22px;
        flex: 0 0 auto;
      }
      .joke{margin:0; font-size:16px; line-height:1.4}
      .joke b{color: var(--text)}
      .actions{
        margin-top: 22px;
        display:flex;
        flex-wrap:wrap;
        gap:12px;
      }
      .btn{
        appearance:none;
        border: 1px solid rgba(255,255,255,.16);
        background: rgba(0,0,0,.24);
        color: var(--text);
        padding: 11px 14px;
        border-radius: 14px;
        font-weight: 650;
        letter-spacing:.2px;
        text-decoration:none;
        display:inline-flex;
        align-items:center;
        gap:10px;
        transition: transform .12s ease, background .12s ease, border-color .12s ease;
        backdrop-filter: blur(10px);
      }
      .btn:hover{transform: translateY(-1px); border-color: rgba(255,255,255,.26)}
      .btn.primary{
        background: linear-gradient(135deg, rgba(124,92,255,.95), rgba(51,214,255,.65));
        border-color: rgba(255,255,255,.20);
      }
      .kbd{
        font: 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
        color: rgba(255,255,255,.82);
        padding: 3px 8px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,.14);
        background: rgba(0,0,0,.25);
      }
      footer{
        margin-top: 14px;
        color: rgba(234,240,255,.55);
        font-size: 12px;
        display:flex;
        justify-content:space-between;
        gap:10px;
        flex-wrap:wrap;
      }
      a{color: rgba(234,240,255,.85)}
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero" role="region" aria-label="Hero">

        <h1>The site has moved to: <a href="https://bjro.dev">bjro.dev</a></h1>

      </section>
    </main>
  </body>
</html>
